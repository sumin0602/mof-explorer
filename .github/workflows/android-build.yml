name: Android Build (AAB)

on:
  workflow_dispatch: {}   # Actions 탭에서 수동으로 "Run workflow" 눌러서 실행
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'android/**'
      - 'js/**'
      - 'css/**'
      - 'icons/**'
      - '*.html'
      - '*.cif'
      - 'capacitor.config.json'
      - 'build-cap.js'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JDK 17 세팅
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 의존성 설치 (devDependencies 포함)
        run: npm install

      # 이 저장소엔 이미 build:cap 스크립트가 있어서 그대로 사용
      - name: 웹 자산 빌드 (www/ 생성)
        run: npm run build:cap

      - name: Capacitor Android 프로젝트 동기화
        run: npx cap sync android

      - name: 서명 키(keystore) 복원
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: gradle.properties에 서명 정보 주입
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF

      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      - name: 릴리즈 AAB 빌드
        run: |
          cd android
          ./gradlew bundleRelease

      - name: 빌드 결과물 업로드 (Actions에서 다운로드 가능)
        uses: actions/upload-artifact@v4
        with:
          name: mof-explorer-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
