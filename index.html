<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MOF Explorer ULTIMATE</title>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#020617; color:white; display:flex; }
#viewer { width:70%; height:100vh; }
#panel { width:30%; padding:15px; background:#0f172a; overflow-y:scroll; }
.card { background:#1e293b; padding:12px; border-radius:10px; margin-bottom:12px; }
button { width:100%; padding:8px; margin-top:6px; border-radius:8px; border:none; background:#22c55e; color:black; font-weight:bold; cursor:pointer; }
button:hover { background:#16a34a; }
input { width:100%; padding:6px; margin-top:5px; }
ul { padding-left: 20px; }
</style>
</head>

<body>
<div id="viewer"></div>

<div id="panel">
<h2>🔬 MOF Explorer</h2>

<div class="card">
  <h3>👤 플레이어</h3>
  <input id="username" placeholder="이름 입력">
  <button onclick="startGame()">게임 시작</button>
</div>

<div class="card">
  <h3>🏆 점수</h3>
  <p id="playerInfo">플레이어 없음</p>
</div>

<div class="card">
  <h3>🎯 미션</h3>
  <p id="mission">게임을 시작하세요!</p>
</div>

<div class="card">
  <h3>🧪 구조</h3>
  <button onclick="showMetal()">금속 찾기</button>
  <button onclick="showLigand()">리간드 보기</button>
</div>

<div class="card">
  <h3>🧪 MOF 비교</h3>
  <button onclick="loadHKUST()">HKUST-1</button>
  <button onclick="loadZIF()">ZIF-8</button>
</div>

<div class="card">
  <h3>🎮 탐험</h3>
  <button onclick="explorePore()">기공 탐험</button>
</div>

<div class="card">
  <h3>🟡 가스</h3>
  <button onclick="startGas()">가스 주입</button>
</div>

<div class="card">
  <h3>❓ 퀴즈</h3>
  <button onclick="quiz()">문제 풀기</button>
</div>

<div class="card">
  <h3>🤖 AI 설명</h3>
  <button onclick="aiExplain()">설명</button>
  <p id="aiText"></p>
</div>

<div class="card">
  <h3>🥇 랭킹</h3>
  <button onclick="saveScore()">점수 저장</button>
  <ul id="ranking"></ul>
</div>

</div>

<script>
let viewer = $3Dmol.createViewer("viewer",{backgroundColor:"#020617"});
let currentMOF = "";
let score = 0;
let player = "";
let gasAtoms = [];

// 시작
function startGame(){
  player = document.getElementById("username").value || "플레이어";
  score = 0;
  updateUI();
  mission("게임 시작! 금속을 찾아라!");
  loadHKUST();
}

// UI 업데이트
function updateUI(){
  document.getElementById("playerInfo").innerText = player + " | Score: " + score;
}

// 점수 추가
function addScore(p){
  score += p;
  updateUI();
}

// 미션
function mission(t){
  document.getElementById("mission").innerText = t;
}

// MOF 로드 (로컬 CIF)
function loadHKUST(){
  currentMOF="HKUST";
  viewer.clear();
  $3Dmol.download("HKUST1.cif", viewer, {}, function(){
    viewer.setStyle({}, {stick:{}});
    viewer.zoomTo();
    viewer.render();
  });
}

function loadZIF(){
  currentMOF="ZIF";
  viewer.clear();
  $3Dmol.download("ZIF-8_DDEC.cif", viewer, {}, function(){
    viewer.setStyle({}, {stick:{color:"#facc15"}});
    viewer.zoomTo();
    viewer.render();
  });
}

// 기능들
function showMetal(){
  viewer.setStyle({}, {});
  if(currentMOF==="HKUST"){
    viewer.setStyle({elem:"Cu"}, {sphere:{color:"cyan"}});
  } else if(currentMOF==="ZIF"){
    viewer.setStyle({elem:"Zn"}, {sphere:{color:"cyan"}});
  }
  viewer.render();
  mission("금속 발견!");
  addScore(10);
}

function showLigand(){
  viewer.setStyle({}, {});
  viewer.setStyle({elem:["C","O","H"]}, {stick:{color:"green"}});
  viewer.render();
  addScore(5);
}

function explorePore(){
  viewer.zoom(0.4);
  viewer.render();
  addScore(10);
}

function startGas(){
  for(let i=0;i<8;i++){
    let a = viewer.addSphere({
      center:{x:Math.random()*10,y:Math.random()*10,z:Math.random()*10},
      radius:0.5,
      color:"yellow"
    });
    gasAtoms.push(a);
  }

  setInterval(()=>{
    gasAtoms.forEach(a=>{
      a.center.x += (Math.random()-0.5);
      a.center.y += (Math.random()-0.5);
      a.center.z += (Math.random()-0.5);
    });
    viewer.render();
  },200);

  addScore(20);
}

function quiz(){
  let a = prompt("금속 원소는?");
  if((currentMOF==="HKUST" && (a.includes("Cu")||a.includes("구리"))) ||
     (currentMOF==="ZIF" && (a.includes("Zn")||a.includes("아연")))){
    addScore(30);
    mission("정답!");
  } else {
    mission("오답!");
  }
}

function aiExplain(){
  let text = currentMOF==="HKUST"
    ? "구리 기반 MOF, 큰 기공 → 저장 용도"
    : "아연 기반 MOF, 작은 기공 → 분리 용도";

  document.getElementById("aiText").innerText = text;
  addScore(5);
}

// 랭킹 (로컬 저장)
function saveScore(){
  let data = JSON.parse(localStorage.getItem("ranking")||"[]");
  data.push({name:player, score:score});
  data.sort((a,b)=>b.score-b.score);
  localStorage.setItem("ranking", JSON.stringify(data));
  showRanking();
}

function showRanking(){
  let data = JSON.parse(localStorage.getItem("ranking")||"[]");
  let list = document.getElementById("ranking");
  list.innerHTML="";
  data.slice(0,5).forEach(d=>{
    let li = document.createElement("li");
    li.innerText = d.name + " - " + d.score;
    list.appendChild(li);
  });
}

showRanking();
</script>
</body>
</html>
